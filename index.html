<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda Inventario</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">🛒 Tienda Inventario</div>
</header>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h3>Iniciar sesión</h3>

    <input type="email" id="email" placeholder="Correo"/>
    <input type="password" id="password" placeholder="Contraseña"/>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="content" id="app" style="display:none;">

  <!-- 🔥 BOTÓN ADMIN (QUITÉ inline display:none para que JS lo controle bien) -->
  <div class="top-actions">
    <button class="add-btn" onclick="openModal()">
      ➕ Agregar producto
    </button>
  </div>

  <!-- GRID PRODUCTOS -->
  <div class="grid" id="productGrid"></div>

</div>

<!-- FOOTER -->
<footer id="footer" style="display:none;">
  <button onclick="showProducts()">Productos</button>
  <button onclick="showSales()">Ventas</button>
</footer>

<!-- ========================= -->
<!-- MODAL AGREGAR PRODUCTO -->
<!-- ========================= -->
<div class="modal" id="productModal">
  <div class="modal-content">

    <h2>Agregar Producto</h2>

    <input id="nombre" placeholder="Nombre del producto">
    <input id="numero_inventario" placeholder="Número de inventario">
    <input id="descripcion" placeholder="Descripción">
    <input id="stock" type="number" placeholder="Stock">
    <input id="unidad_medida" placeholder="Unidad de medida">
    <input id="precio_cup" type="number" placeholder="Precio CUP">

    <input type="file" id="imagen">

    <div class="modal-actions">
      <button onclick="addProduct()">Guardar</button>
      <button onclick="closeModal()">Cancelar</button>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- MODAL VENDER PRODUCTO -->
<!-- ========================= -->
<div class="modal" id="sellModal">
  <div class="modal-content">

    <h2>Vender producto</h2>

    <p id="sellInfo"></p>

    <input type="number" id="sellQuantity" placeholder="Cantidad">

    <div class="modal-actions">
      <button onclick="confirmSell()">OK</button>
      <button onclick="closeSellModal()">Cancelar</button>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- MODAL EDITAR PRODUCTO -->
<!-- ========================= -->
<div class="modal" id="editModal">
  <div class="modal-content">

    <h2>Editar producto</h2>

    <input id="edit_nombre" placeholder="Nombre">
    <input id="edit_numero_inventario" placeholder="Número inventario">
    <input id="edit_descripcion" placeholder="Descripción">
    <input id="edit_stock" type="number" placeholder="Stock">
    <input id="edit_unidad_medida" placeholder="Unidad medida">
    <input id="edit_precio_cup" type="number" placeholder="Precio CUP">
    <input type="file" id="edit_imagen">

    <div class="modal-actions">
      <button onclick="updateProduct()">Guardar cambios</button>
      <button onclick="closeEditModal()">Cancelar</button>
    </div>

  </div>
</div>

<!-- SUPABASE + JS -->
<script type="module" src="script.js"></script>

</body>
</html>
