<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda Inventario</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">🛒 Tienda Inventario</div>
</header>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h3>Iniciar sesión</h3>

    <input type="email" id="email" placeholder="Correo"/>
    <input type="password" id="password" placeholder="Contraseña"/>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="content" id="app" style="display:none;">

  <!-- BOTÓN ADMIN -->
  <div class="top-actions" style="display:none;">
    <button class="add-btn" onclick="openModal()">
      ➕ Agregar producto
    </button>
  </div>

  <!-- GRID PRODUCTOS -->
  <div class="grid" id="productGrid">
    <!-- productos dinámicos -->
  </div>

</div>

<!-- FOOTER -->
<footer id="footer" style="display:none;">
  <button onclick="showProducts()">Productos</button>
  <button onclick="showSales()">Ventas</button>
</footer>

<!-- MODAL AGREGAR PRODUCTO -->
<div class="modal" id="productModal">
  <div class="modal-content">

    <h2>Agregar Producto</h2>

    <!-- 🔥 CAMPOS CORRECTOS SEGÚN SUPABASE -->
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="numero_inventario" placeholder="Número de inventario">
    <input type="text" id="descripcion" placeholder="Descripción">

    <input type="number" id="stock" placeholder="Stock">
    <input type="text" id="unidad_medida" placeholder="Unidad de medida">
    <input type="number" id="precio_cup" placeholder="Precio CUP">
    <input type="text" id="categoria" placeholder="Categoría">

    <!-- 🔥 IMAGEN REAL (GALERÍA / CÁMARA / PC) -->
    <input type="file" id="imagen" accept="image/*">

    <div class="modal-actions">
      <button onclick="addProduct()">Guardar</button>
      <button onclick="closeModal()">Cancelar</button>
    </div>

  </div>
</div>

<!-- SUPABASE + JS -->
<script type="module" src="script.js"></script>

</body>
</html>
