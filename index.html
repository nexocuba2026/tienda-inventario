<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda Inventario</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">🛒 Tienda Inventario</div>
</header>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
  <div class="login-box">
    <h3>Iniciar sesión</h3>

    <input type="email" id="email" placeholder="Correo"/>
    <input type="password" id="password" placeholder="Contraseña"/>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="content" id="app" style="display:none;">

  <div class="grid" id="productGrid">
    <!-- productos dinámicos -->
  </div>

</div>

<!-- FOOTER (OCULTO POR DEFECTO) -->
<footer id="footer" style="display:none;">
  <button onclick="showProducts()">Productos</button>
  <button onclick="showSales()">Ventas</button>
</footer>

<!-- SUPABASE (MODERNO + CORRECTO) -->
<script type="module" src="script.js"></script>

</body>
</html>
